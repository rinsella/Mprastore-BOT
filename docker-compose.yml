services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: domainbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_IDS: ${ADMIN_IDS}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/domainbot
      CHECK_INTERVAL_MINUTES: ${CHECK_INTERVAL_MINUTES:-10}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      # Web Admin Panel
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-}
      ADMIN_WEB_ENABLED: ${ADMIN_WEB_ENABLED:-true}
      ADMIN_WEB_PATH: ${ADMIN_WEB_PATH:-/admin}
      ADMIN_WEB_USERNAME: ${ADMIN_WEB_USERNAME:-admin}
      ADMIN_WEB_PASSWORD_HASH: ${ADMIN_WEB_PASSWORD_HASH:-}
      ADMIN_WEB_PASSWORD: ${ADMIN_WEB_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      SESSION_MAX_AGE_HOURS: ${SESSION_MAX_AGE_HOURS:-8}
    # Port 3000 di-expose ke localhost saja; akses publik lewat Caddy (HTTPS).
    # Ganti ke "127.0.0.1:${PORT:-3000}:3000" untuk menutup akses langsung dari internet.
    ports:
      - "${PORT:-3000}:3000"

  # Reverse proxy + HTTPS otomatis (Let's Encrypt) untuk domain.
  # Aktif hanya jika DOMAIN diisi di .env. Jika tidak pakai domain, abaikan service ini.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - bot
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
